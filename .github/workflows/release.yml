name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write # for cosign keyless signing

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: clone gr beside the repo
        run: git clone --depth 1 https://github.com/tamnd/gr.git ../gr

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: "v2.6.3"

      - name: install syft (for SBOM)
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v4.1.0

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: set skip flags for optional publishers
        id: skip
        run: |
          SKIP=""
          if [ -z "${{ secrets.HOMEBREW_TAP_TOKEN }}" ]; then
            SKIP="${SKIP},homebrew"
          fi
          if [ -z "${{ secrets.SCOOP_BUCKET_TOKEN }}" ]; then
            SKIP="${SKIP},scoop"
          fi
          # Remove leading comma if present.
          SKIP="${SKIP#,}"
          if [ -n "$SKIP" ]; then
            echo "args=release --clean --skip=${SKIP}" >> "$GITHUB_OUTPUT"
          else
            echo "args=release --clean" >> "$GITHUB_OUTPUT"
          fi

      - name: run GoReleaser
        uses: goreleaser/goreleaser-action@v7.2.2
        with:
          version: "~> v2"
          args: ${{ steps.skip.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
