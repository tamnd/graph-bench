name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # gr is a local replace (../gr); clone it beside this repo so the module
      # resolves. The checkout action refuses paths outside the workspace, so a
      # plain clone is used. gr is public, so no token is needed.
      - name: clone gr beside the repo
        run: git clone --depth 1 https://github.com/tamnd/gr.git ../gr

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./... -timeout 10m
