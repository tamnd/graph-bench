# Stands up the three Bolt-plane benchmark targets side by side so a single
# bolt-tagged graph-bench binary can drive all of them from the host.
#
# Each service exposes Bolt on a distinct host port so they coexist:
#   gr-bolt    bolt://127.0.0.1:7689   (GR_BOLT_URI default)
#   neo4j      bolt://127.0.0.1:7687   (NEO4J_URI default)
#   memgraph   bolt://127.0.0.1:7688   (mapped from the container's 7687)
#
# Bring them up with:   docker compose -f docker/docker-compose.yml up -d --build
# Then run the bench from the repo root, for example:
#   NEO4J_PASS=benchbench go run -tags bolt ./cmd/graph-bench \
#       run --workload micro-grid --engines gr-bolt,neo4j,memgraph --count 30
services:
  gr-bolt:
    build:
      context: .
      dockerfile: gr-bolt.Dockerfile
    ports:
      - "7689:7689"
      - "7475:7475"
    volumes:
      - gr-data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/7689'"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    build:
      context: .
      dockerfile: neo4j.Dockerfile
    # The Neo4j Community image rejects a password shorter than 8 characters, so
    # the adapter's "none" default does not work here; run the bench with
    # NEO4J_PASS=benchbench to match.
    environment:
      NEO4J_AUTH: "neo4j/benchbench"
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7474 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  memgraph:
    build:
      context: .
      dockerfile: memgraph.Dockerfile
    ports:
      - "7688:7687"
    volumes:
      - memgraph-data:/var/lib/memgraph
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/7687'"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  gr-data:
  neo4j-data:
  memgraph-data:
